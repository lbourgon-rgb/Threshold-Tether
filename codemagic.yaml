workflows:
  velarium-ios-simulator:
    name: Velarium iOS Simulator Build
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      vars:
        XCODE_PROJECT_ROOT: Velarium-iOS
        XCODE_PROJECT: Velarium.xcodeproj
        XCODE_SCHEME: Velarium
    scripts:
      - name: Install XcodeGen
        script: |
          brew list xcodegen >/dev/null 2>&1 || brew install xcodegen
      - name: Generate Xcode project
        script: |
          cd "$XCODE_PROJECT_ROOT"
          xcodegen generate
      - name: Build for iOS Simulator
        script: |
          cd "$XCODE_PROJECT_ROOT"
          xcodebuild \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Debug \
            -destination "generic/platform=iOS Simulator" \
            CODE_SIGNING_ALLOWED=NO \
            build
    artifacts:
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app
      - /tmp/xcodebuild_logs/*.log

  velarium-ios-testflight:
    name: Velarium iOS TestFlight Archive
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Velarium Codemagic
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.velastrae.velarium
      vars:
        XCODE_PROJECT_ROOT: Velarium-iOS
        XCODE_PROJECT: Velarium.xcodeproj
        XCODE_SCHEME: Velarium
    scripts:
      - name: Install XcodeGen
        script: |
          brew list xcodegen >/dev/null 2>&1 || brew install xcodegen
      - name: Generate Xcode project
        script: |
          cd "$XCODE_PROJECT_ROOT"
          xcodegen generate
      - name: Apply App Store signing profiles
        script: |
          cd "$XCODE_PROJECT_ROOT"
          xcode-project use-profiles --custom-export-options='{"testFlightInternalTestingOnly": true}'
      - name: Build signed IPA
        script: |
          cd "$XCODE_PROJECT_ROOT"
          xcode-project build-ipa --project "$XCODE_PROJECT" --scheme "$XCODE_SCHEME" --clean
    artifacts:
      - Velarium-iOS/build/ios/ipa/*.ipa
      - Velarium-iOS/build/ios/xcarchive/*.xcarchive
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration

