workflows:
  velarium-ios-simulator:
    name: Velarium iOS Simulator Build
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      vars:
        XCODE_PROJECT_ROOT: Velarium-iOS
        XCODE_PROJECT: Velarium.xcodeproj
        XCODE_SCHEME: Velarium
        DERIVED_DATA_PATH: build/DerivedData
    scripts:
      - name: Install XcodeGen
        script: |
          brew list xcodegen >/dev/null 2>&1 || brew install xcodegen
      - name: Generate Xcode project
        script: |
          cd "$XCODE_PROJECT_ROOT"
          xcodegen generate
      - name: Build for iOS Simulator
        script: |
          cd "$XCODE_PROJECT_ROOT"
          xcodebuild \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination "generic/platform=iOS Simulator" \
            -derivedDataPath "$DERIVED_DATA_PATH" \
            CODE_SIGNING_ALLOWED=NO \
            build
      - name: List simulator app artifact
        script: |
          find "$XCODE_PROJECT_ROOT/build/DerivedData/Build/Products" -name "*.app" -maxdepth 4 -print
    artifacts:
      - Velarium-iOS/build/DerivedData/Build/Products/Debug-iphonesimulator/*.app
      - /tmp/xcodebuild_logs/*.log

  velarium-ios-testflight:
    name: Velarium iOS TestFlight Archive
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Velarium Codemagic
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.velastrae.velarium
      vars:
        XCODE_PROJECT_ROOT: Velarium-iOS
        XCODE_PROJECT: Velarium.xcodeproj
        XCODE_SCHEME: Velarium
    scripts:
      - name: Install XcodeGen
        script: |
          brew list xcodegen >/dev/null 2>&1 || brew install xcodegen
      - name: Generate Xcode project
        script: |
          cd "$XCODE_PROJECT_ROOT"
          xcodegen generate
      - name: Verify source icon metadata
        script: |
          echo "Codemagic source commit: $(git rev-parse --short HEAD)"
          /usr/libexec/PlistBuddy -c "Print :CFBundleIconName" "$XCODE_PROJECT_ROOT/Velarium/Info.plist"
          /usr/libexec/PlistBuddy -c "Print :CFBundleIcons:CFBundlePrimaryIcon:CFBundleIconFiles" "$XCODE_PROJECT_ROOT/Velarium/Info.plist"
          test -f "$XCODE_PROJECT_ROOT/Velarium/Assets.xcassets/AppIcon.appiconset/Icon-1024.png"
          sips -g pixelWidth -g pixelHeight "$XCODE_PROJECT_ROOT/Velarium/Assets.xcassets/AppIcon.appiconset/Icon-1024.png" | grep -q "pixelWidth: 1024"
          sips -g pixelWidth -g pixelHeight "$XCODE_PROJECT_ROOT/Velarium/Assets.xcassets/AppIcon.appiconset/Icon-1024.png" | grep -q "pixelHeight: 1024"
          grep -q '"idiom" : "universal"' "$XCODE_PROJECT_ROOT/Velarium/Assets.xcassets/AppIcon.appiconset/Contents.json"
          grep -q '"platform" : "ios"' "$XCODE_PROJECT_ROOT/Velarium/Assets.xcassets/AppIcon.appiconset/Contents.json"
          test -f "$XCODE_PROJECT_ROOT/Velarium/Resources/AppIcon60x60@2x.png"
          test -f "$XCODE_PROJECT_ROOT/Velarium/Resources/AppIcon60x60@3x.png"
          sips -g pixelWidth -g pixelHeight "$XCODE_PROJECT_ROOT/Velarium/Resources/AppIcon60x60@2x.png" | grep -q "pixelWidth: 120"
          sips -g pixelWidth -g pixelHeight "$XCODE_PROJECT_ROOT/Velarium/Resources/AppIcon60x60@2x.png" | grep -q "pixelHeight: 120"
          grep -q "Assets.xcassets" "$XCODE_PROJECT_ROOT/$XCODE_PROJECT/project.pbxproj"
          grep -q "AppIcon60x60@2x.png" "$XCODE_PROJECT_ROOT/$XCODE_PROJECT/project.pbxproj"
          grep -q "Gallery" "$XCODE_PROJECT_ROOT/$XCODE_PROJECT/project.pbxproj"
      - name: Apply App Store signing profiles
        script: |
          cd "$XCODE_PROJECT_ROOT"
          xcode-project use-profiles --custom-export-options='{"testFlightInternalTestingOnly": true}'
      - name: Build signed IPA
        script: |
          cd "$XCODE_PROJECT_ROOT"
          xcode-project build-ipa --project "$XCODE_PROJECT" --scheme "$XCODE_SCHEME" --clean
      - name: Verify built IPA icon metadata
        script: |
          cd "$XCODE_PROJECT_ROOT"
          rm -rf build/ios/ipa-inspect
          mkdir -p build/ios/ipa-inspect
          unzip -q build/ios/ipa/Velarium.ipa -d build/ios/ipa-inspect
          INFO_PLIST="$(find build/ios/ipa-inspect/Payload -name Info.plist | head -n 1)"
          APP_BUNDLE="$(find build/ios/ipa-inspect/Payload -maxdepth 1 -name "*.app" -type d | head -n 1)"
          /usr/libexec/PlistBuddy -c "Print :CFBundleIconName" "$INFO_PLIST" | grep -q "AppIcon"
          /usr/libexec/PlistBuddy -c "Print :CFBundleIcons:CFBundlePrimaryIcon:CFBundleIconName" "$INFO_PLIST" | grep -q "AppIcon"
          /usr/libexec/PlistBuddy -c "Print :CFBundleIcons:CFBundlePrimaryIcon:CFBundleIconFiles" "$INFO_PLIST"
          test -f "$APP_BUNDLE/Assets.car"
          test -f "$APP_BUNDLE/AppIcon60x60@2x.png"
          test -f "$APP_BUNDLE/AppIcon60x60@3x.png"
          test -d "$APP_BUNDLE/Gallery"
          ICON_LIST="build/ios/ipa-icon-files.txt"
          find "$APP_BUNDLE" -maxdepth 2 -type f | sort | tee "$ICON_LIST"
          assetutil --info "$APP_BUNDLE/Assets.car" > build/ios/assets-car-info.json || true
    artifacts:
      - Velarium-iOS/build/ios/ipa/*.ipa
      - Velarium-iOS/build/ios/ipa-icon-files.txt
      - Velarium-iOS/build/ios/assets-car-info.json
      - Velarium-iOS/build/ios/xcarchive/*.xcarchive
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
