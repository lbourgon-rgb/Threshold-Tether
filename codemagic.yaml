workflows:
  velarium-ios-simulator:
    name: Velarium iOS Simulator Build
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      vars:
        XCODE_PROJECT_ROOT: Velarium-iOS
        XCODE_PROJECT: Velarium.xcodeproj
        XCODE_SCHEME: Velarium
        DERIVED_DATA_PATH: build/DerivedData
    scripts:
      - name: Install XcodeGen
        script: |
          brew list xcodegen >/dev/null 2>&1 || brew install xcodegen
      - name: Generate Xcode project
        script: |
          cd "$XCODE_PROJECT_ROOT"
          xcodegen generate
      - name: Build for iOS Simulator
        script: |
          cd "$XCODE_PROJECT_ROOT"
          xcodebuild \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination "generic/platform=iOS Simulator" \
            -derivedDataPath "$DERIVED_DATA_PATH" \
            CODE_SIGNING_ALLOWED=NO \
            build
      - name: List simulator app artifact
        script: |
          find "$XCODE_PROJECT_ROOT/build/DerivedData/Build/Products" -name "*.app" -maxdepth 4 -print
    artifacts:
      - Velarium-iOS/build/DerivedData/Build/Products/Debug-iphonesimulator/*.app
      - /tmp/xcodebuild_logs/*.log

  velarium-ios-testflight:
    name: Velarium iOS TestFlight Archive
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Velarium Codemagic
    environment:
      groups:
        - velarium-code-signing
      vars:
        BUNDLE_ID: com.velastrae.velarium
        XCODE_PROJECT_ROOT: Velarium-iOS
        XCODE_PROJECT: Velarium.xcodeproj
        XCODE_SCHEME: Velarium
    scripts:
      - name: Install XcodeGen
        script: |
          brew list xcodegen >/dev/null 2>&1 || brew install xcodegen
      - name: Generate Xcode project
        script: |
          cd "$XCODE_PROJECT_ROOT"
          xcodegen generate
      - name: Initialize signing keychain
        script: |
          keychain initialize
      - name: Fetch or create App Store signing files
        script: |
          if [ -z "${CERTIFICATE_PRIVATE_KEY:-}" ]; then
            echo "Missing CERTIFICATE_PRIVATE_KEY. Add it as a secret in the Codemagic environment group velarium-code-signing."
            exit 1
          fi
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
      - name: Add signing certificates to keychain
        script: |
          keychain add-certificates
      - name: Apply App Store signing profiles
        script: |
          cd "$XCODE_PROJECT_ROOT"
          xcode-project use-profiles --custom-export-options='{"testFlightInternalTestingOnly": true}'
      - name: Build signed IPA
        script: |
          cd "$XCODE_PROJECT_ROOT"
          xcode-project build-ipa --project "$XCODE_PROJECT" --scheme "$XCODE_SCHEME" --clean
    artifacts:
      - Velarium-iOS/build/ios/ipa/*.ipa
      - Velarium-iOS/build/ios/xcarchive/*.xcarchive
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
