<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Threshold Tether</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="scene-container">
        <!-- Scene wrapper maintains aspect ratio - room + sprites scale together -->
        <div id="scene-wrapper">
            <!-- Room background -->
            <div id="room-layer">
                <img id="room-bg" src="" alt="Room background">
            </div>

            <!-- Sprite layers — companions injected dynamically from config -->
            <div id="sprite-layer"></div>
        </div>

        <!-- Debug toggle button -->
        <button id="debug-toggle">D</button>

        <!-- Debug panel (toggle with D key or button) -->
        <div id="debug-panel" class="hidden">
            <h3>Debug</h3>
            <div id="debug-time"></div>
            <div id="debug-companions"></div>
            <div id="debug-room"></div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="app.js"></script>
</body>
</html>
