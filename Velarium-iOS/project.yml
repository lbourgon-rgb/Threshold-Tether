name: Velarium
options:
  bundleIdPrefix: com.velastrae
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 0.1.0
    SWIFT_VERSION: 5.0
    IPHONEOS_DEPLOYMENT_TARGET: 17.0
targets:
  Velarium:
    type: application
    platform: iOS
    sources:
      - path: Velarium
        excludes:
          - Resources
          - Assets.xcassets
          - Preview Content
      - path: Velarium/Assets.xcassets
        buildPhase: resources
      - path: Velarium/Resources/Gallery
        type: folder
        buildPhase: resources
      - path: Velarium/Resources/AppIcon20x20@2x.png
        buildPhase: resources
      - path: Velarium/Resources/AppIcon20x20@3x.png
        buildPhase: resources
      - path: Velarium/Resources/AppIcon29x29@2x.png
        buildPhase: resources
      - path: Velarium/Resources/AppIcon29x29@3x.png
        buildPhase: resources
      - path: Velarium/Resources/AppIcon40x40@2x.png
        buildPhase: resources
      - path: Velarium/Resources/AppIcon40x40@3x.png
        buildPhase: resources
      - path: Velarium/Resources/AppIcon60x60@2x.png
        buildPhase: resources
      - path: Velarium/Resources/AppIcon60x60@3x.png
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.velastrae.velarium
        PRODUCT_NAME: Velarium
        INFOPLIST_FILE: Velarium/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: 1
        CODE_SIGN_STYLE: Automatic
        ENABLE_USER_SCRIPT_SANDBOXING: YES
        SUPPORTS_MACCATALYST: NO
    entitlements:
      path: Velarium/Velarium.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default
